<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root {
  color-scheme: light dark;

  --bg: #ffffff;
  --text: #37352f;
  --muted: rgba(55,53,47,0.65);
  --border: rgba(55,53,47,0.08);
  --hover: rgba(55,53,47,0.06);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #191919;
    --text: rgba(255,255,255,0.9);
    --muted: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.1);
    --hover: rgba(255,255,255,0.08);
  }
}

body {
  margin:0;
  padding:6px 10px;
  background:var(--bg);
  color:var(--text);

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Segoe UI",
  Helvetica,
  Arial,
  sans-serif;

  font-size:14px;
}

.feed {
  display:flex;
  flex-direction:column;
}

.item {
  padding:6px 0;
  border-bottom:1px solid var(--border);
}

.item:last-child {
  border-bottom:none;
}

.title {
  display:block;
  text-decoration:none;
  color:var(--text);
  font-weight:500;
  line-height:1.35;
}

.title:hover {
  background:var(--hover);
}

.date {
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}

</style>
</head>

<body>

<div id="feed" class="feed">
Loading…
</div>

<script>

const FEED = "./notion.xml";

function formatDate(d){
  const date = new Date(d);
  return date.toLocaleDateString("en-GB", {
    day:"numeric",
    month:"short",
    year:"numeric"
  });
}

fetch(FEED + "?t=" + Date.now())
.then(r => r.text())
.then(str => {

  const parser = new DOMParser();
  const xml = parser.parseFromString(str,"text/xml");
  const items = Array.from(xml.querySelectorAll("item")).sort((a, b) => {
  const dateA = new Date(a.querySelector("pubDate").textContent);
  const dateB = new Date(b.querySelector("pubDate").textContent);
  return dateB - dateA;
});

  const container = document.getElementById("feed");
  container.innerHTML = "";

  items.forEach(item => {

    const title = item.querySelector("title").textContent;
    const link = item.querySelector("link").textContent;
    const date = item.querySelector("pubDate").textContent;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <a class="title" href="${link}" target="_blank">
        ${title}
      </a>
      <div class="date">${formatDate(date)}</div>
    `;

    container.appendChild(div);

  });

});

</script>

</body>
</html>
