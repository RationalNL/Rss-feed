<script>
const FEED = "./notion.xml";
let ALL_ITEMS = [];

/* ticker auto-scroll + drag state */
let tickerAnimationFrame = null;
let tickerHalfWidth = 0;
let isTickerHovered = false;
let isTickerDragging = false;
let tickerDragStartX = 0;
let tickerDragStartScrollLeft = 0;
let currentTickerScroll = 0;
const tickerSpeedPxPerFrame = 0.7;

/* refresh control */
let lastRefreshTime = 0;
const MIN_REFRESH_INTERVAL = 15000; // 15 sec anti-spam

function safeRefresh(){
  const now = Date.now();
  if (now - lastRefreshTime < MIN_REFRESH_INTERVAL) return;
  lastRefreshTime = now;
  refreshAll();
}

function escapeHtml(str){
  return (str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function formatDateTime(date){
  if (!(date instanceof Date) || isNaN(date)) return "";
  return date.toLocaleString("en-GB", {
    day: "numeric",
    month: "long",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).replace(",", "");
}

function splitTitleAndSource(fullTitle){
  const parts = (fullTitle || "").split(" - ");
  if (parts.length >= 2){
    const source = parts.pop();
    const title = parts.join(" - ");
    return { title, source };
  }
  return { title: fullTitle || "Untitled", source: "" };
}

function parseRSS(xmlText){
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, "text/xml");

  return Array.from(xml.querySelectorAll("item"))
    .map(item => {
      const fullTitle = item.querySelector("title")?.textContent?.trim() || "Untitled";
      const link = item.querySelector("link")?.textContent?.trim() || "#";
      const pubDateRaw = item.querySelector("pubDate")?.textContent || "";
      const pubDate = new Date(pubDateRaw);
      const split = splitTitleAndSource(fullTitle);

      return {
        title: split.title,
        source: split.source,
        link,
        pubDate
      };
    })
    .sort((a,b) => b.pubDate - a.pubDate);
}

function buildTicker(items){
  return items.map(i => {
    const prefix = formatDateTime(i.pubDate);
    const sourceText = i.source ? ` - ${escapeHtml(i.source)}` : "";
    return `
      <span class="ticker-item">
        <a class="ticker-link" href="${escapeHtml(i.link)}" target="_blank" rel="noopener noreferrer">
          <span class="prefix">${escapeHtml(prefix)} - </span><span class="headline">${escapeHtml(i.title)}</span><span class="source">${sourceText}</span>
        </a>
        <span class="separator">•</span>
      </span>
    `;
  }).join("");
}

function getCardMaxWidth(width){
  if (width <= 700) return 280;
  if (width <= 1100) return 330;
  return 380;
}

function getMinGap(width){
  if (width <= 700) return 18;
  if (width <= 1100) return 24;
  return 30;
}

function createCardHtml(item, withDivider = false){
  return `
    <div class="teaser-card ${withDivider ? "with-divider" : ""}">
      <a class="teaser-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">
        <h3 class="teaser-title">${escapeHtml(item.title)}</h3>
        <div class="teaser-meta">
          <span>${escapeHtml(formatDateTime(item.pubDate))}</span>
          ${item.source ? `<span>·</span><span class="teaser-source">${escapeHtml(item.source)}</span>` : ""}
        </div>
      </a>
    </div>
  `;
}

function measureCards(items, containerWidth){
  const measureStrip = document.getElementById("measure-strip");
  const maxWidth = getCardMaxWidth(containerWidth);

  measureStrip.style.setProperty("--card-max-width", `${maxWidth}px`);
  measureStrip.innerHTML = items.map(item => createCardHtml(item)).join("");

  const cards = Array.from(measureStrip.querySelectorAll(".teaser-card"));
  return cards.map(card => {
    const link = card.querySelector(".teaser-link");
    return Math.ceil(link.getBoundingClientRect().width);
  });
}

function renderTeasers(){
  const container = document.getElementById("teasers");
  if (!ALL_ITEMS.length) return;

  const width = container.clientWidth;
  const minGap = getMinGap(width);

  if (width <= 520){
    container.innerHTML = "";
    container.style.gap = "0px";
    return;
  }

  const candidateItems = ALL_ITEMS.slice(0, 10);
  const measuredWidths = measureCards(candidateItems, width);

  let used = 0;
  let count = 0;

  for (let i = 0; i < measuredWidths.length; i++){
    const nextWidth = measuredWidths[i];
    const nextUsed = used + nextWidth + (count > 0 ? minGap : 0);

    if (nextUsed <= width){
      used = nextUsed;
      count++;
    } else {
      break;
    }
  }

  if (count === 0){
    container.innerHTML = "";
    container.style.gap = "0px";
    return;
  }

  const visibleItems = candidateItems.slice(0, count);
  const visibleWidths = measuredWidths.slice(0, count);

  let gap = minGap;
  if (count > 1){
    const totalCardsWidth = visibleWidths.reduce((a,b) => a + b, 0);
    const leftover = Math.max(0, width - totalCardsWidth);
    gap = leftover / (count - 1);
  }

  container.style.gap = `${gap}px`;
  container.style.setProperty("--divider-offset", `${Math.max(10, gap / 2)}px`);
  container.style.setProperty("--card-max-width", `${getCardMaxWidth(width)}px`);

  container.innerHTML = visibleItems.map((item, index) =>
    createCardHtml(item, index > 0)
  ).join("");
}

function stopTickerAutoScroll(){
  if (tickerAnimationFrame){
    cancelAnimationFrame(tickerAnimationFrame);
    tickerAnimationFrame = null;
  }
}

function setupTickerInteraction(){
  const tickerWrap = document.getElementById("tickerWrap");
  const ticker = document.getElementById("ticker");

  stopTickerAutoScroll();

  if (!ticker || ticker.classList.contains("loading") || ticker.classList.contains("error")){
    return;
  }

  requestAnimationFrame(() => {
    tickerHalfWidth = ticker.scrollWidth / 2;
    currentTickerScroll = 0;
    tickerWrap.scrollLeft = 0;
  });

  const autoScroll = () => {
    if (!isTickerHovered && !isTickerDragging && tickerHalfWidth > 0){
      currentTickerScroll += tickerSpeedPxPerFrame;

      if (currentTickerScroll >= tickerHalfWidth){
        currentTickerScroll -= tickerHalfWidth;
      }

      tickerWrap.scrollLeft = currentTickerScroll;
    }

    tickerAnimationFrame = requestAnimationFrame(autoScroll);
  };

  tickerAnimationFrame = requestAnimationFrame(autoScroll);
}

function attachTickerEvents(){
  const tickerWrap = document.getElementById("tickerWrap");

  tickerWrap.addEventListener("mouseenter", () => {
    isTickerHovered = true;
  });

  tickerWrap.addEventListener("mouseleave", () => {
    isTickerHovered = false;
    isTickerDragging = false;
    tickerWrap.classList.remove("dragging");
  });

  tickerWrap.addEventListener("mousedown", (e) => {
    isTickerDragging = true;
    isTickerHovered = true;
    tickerDragStartX = e.clientX;
    tickerDragStartScrollLeft = currentTickerScroll;
    tickerWrap.classList.add("dragging");
  });

  window.addEventListener("mousemove", (e) => {
    if (!isTickerDragging) return;

    const deltaX = e.clientX - tickerDragStartX;
    currentTickerScroll = tickerDragStartScrollLeft - deltaX;

    if (tickerHalfWidth > 0){
      while (currentTickerScroll < 0){
        currentTickerScroll += tickerHalfWidth;
        tickerDragStartScrollLeft += tickerHalfWidth;
      }

      while (currentTickerScroll >= tickerHalfWidth){
        currentTickerScroll -= tickerHalfWidth;
        tickerDragStartScrollLeft -= tickerHalfWidth;
      }
    }

    tickerWrap.scrollLeft = currentTickerScroll;
  });

  window.addEventListener("mouseup", () => {
    if (!isTickerDragging) return;
    isTickerDragging = false;
    tickerWrap.classList.remove("dragging");
  });

  tickerWrap.addEventListener("dragstart", (e) => {
    e.preventDefault();
  });
}

async function loadTicker(){
  const ticker = document.getElementById("ticker");
  const teasers = document.getElementById("teasers");

  try{
    const response = await fetch(FEED + "?t=" + Date.now(), { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const xml = await response.text();
    const items = parseRSS(xml);

    if (!items.length){
      ticker.className = "error";
      ticker.textContent = "No items found.";
      teasers.innerHTML = `<div class="error">No article data found.</div>`;
      return;
    }

    ALL_ITEMS = items;

    ticker.className = "ticker-track";
    ticker.innerHTML = buildTicker(items) + buildTicker(items);

    renderTeasers();
    setupTickerInteraction();
  } catch (e){
    ticker.className = "error";
    ticker.textContent = "Could not load feed.";
    teasers.innerHTML = `<div class="error">Could not load latest articles.</div>`;
    console.error(e);
  }
}

const resizeObserver = new ResizeObserver(() => {
  renderTeasers();
  setupTickerInteraction();
});

async function refreshAll() {
  await loadTicker();
  const teaserContainer = document.getElementById("teasers");
  resizeObserver.observe(teaserContainer);
}

/* initial setup */
attachTickerEvents();
refreshAll();

/* periodic refresh */
setInterval(() => {
  safeRefresh();
}, 5 * 60 * 1000);

/* refresh when tab becomes visible */
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible"){
    safeRefresh();
  }
});

/* refresh when window regains focus */
window.addEventListener("focus", () => {
  safeRefresh();
});
</script>
