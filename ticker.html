<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RSS Ticker</title>

<style>
:root{
  color-scheme: light dark;

  --bg:#ffffff;
  --text:#37352f;
  --muted:rgba(55,53,47,0.68);
  --subtle:rgba(55,53,47,0.46);
  --separator:rgba(55,53,47,0.28);
  --border:rgba(55,53,47,0.08);
  --hover:rgba(55,53,47,0.06);

  --ticker-bg: rgba(46,170,220,0.2);
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#191919;
    --text:rgba(255,255,255,0.92);
    --muted:rgba(255,255,255,0.72);
    --subtle:rgba(255,255,255,0.48);
    --separator:rgba(255,255,255,0.26);
    --border:rgba(255,255,255,0.08);
    --hover:rgba(255,255,255,0.08);

    --ticker-bg:rgba(40,69,108,1.0);
  }
}

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
  overflow:hidden;
}

.shell{
  box-sizing:border-box;
  width:100%;
  height:100vh;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  background:var(--bg);
  padding:10px 14px 10px 14px;
  gap:10px;
}

.ticker-wrap{
  position:relative;
  width:100%;
  height:32px;
  display:flex;
  align-items:center;
  overflow-x:auto;
  overflow-y:hidden;
  white-space:nowrap;
  flex:0 0 auto;

  background:var(--ticker-bg);
  border-radius:0;

  padding:3px 12px;
  margin-bottom:6px;

  cursor:grab;
  scrollbar-width:none;
}

.ticker-wrap::-webkit-scrollbar{ display:none; }

.ticker-wrap.dragging{ cursor:grabbing; }

.ticker-track{
  display:flex;
  align-items:center;
  min-width:max-content;
}

.ticker-item{
  display:flex;
  align-items:center;
}

.ticker-link{
  display:inline-flex;
  align-items:center;
  color:var(--text);
  text-decoration:none;
  font-size:13px;
  line-height:1.2;
  padding:2px 5px;
  border-radius:6px;
}

.prefix{ color:var(--muted); }
.headline{ font-weight:600; }
.source{ color:var(--subtle); }

.separator{
  padding:0 12px;
  font-size:13px;
  color:var(--separator);
}

/* teasers (ongewijzigd) */
.teaser-strip{
  flex:1;
  display:flex;
  overflow:hidden;
}

.loading{ font-size:13px; color:var(--muted); }
</style>
</head>

<body>
<div class="shell">
  <div class="ticker-wrap" id="tickerWrap">
    <div id="ticker" class="loading">Loading…</div>
  </div>

  <div id="teasers" class="teaser-strip"></div>
</div>

<script>
const FEED = "./notion.xml";
let tickerAnimationFrame = null;
let tickerHalfWidth = 0;
let currentTickerScroll = 0;
let isTickerHovered = false;
let isTickerDragging = false;
let tickerDragStartX = 0;
let tickerDragStartScrollLeft = 0;

const tickerDurationMs = 160000;
let lastTickerFrameTime = null;

/* refresh control */
let lastRefreshTime = 0;
const MIN_REFRESH_INTERVAL = 15000; // 15 sec anti-spam

function safeRefresh(){
  const now = Date.now();
  if (now - lastRefreshTime < MIN_REFRESH_INTERVAL) return;
  lastRefreshTime = now;
  load();
}

/* utils */
function escapeHtml(str){
  return (str||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function formatDateTime(date){
  return date.toLocaleString("en-GB",{
    day:"numeric",month:"long",hour:"2-digit",minute:"2-digit",hour12:false
  }).replace(",","");
}

function parseRSS(xmlText){
  const xml=new DOMParser().parseFromString(xmlText,"text/xml");
  return [...xml.querySelectorAll("item")].map(item=>{
    const full=item.querySelector("title")?.textContent||"";
    const parts=full.split(" - ");
    return{
      title:parts.slice(0,-1).join(" - "),
      source:parts.slice(-1)[0],
      link:item.querySelector("link")?.textContent||"#",
      pubDate:new Date(item.querySelector("pubDate")?.textContent||"")
    };
  }).sort((a,b)=>b.pubDate-a.pubDate);
}

function buildTicker(items){
  return items.map(i=>{
    return `
    <span class="ticker-item">
      <a class="ticker-link" href="${i.link}" target="_blank" rel="noopener noreferrer">
        <span class="prefix">${formatDateTime(i.pubDate)} - </span>
        <span class="headline">${escapeHtml(i.title)}</span>
        <span class="source"> - ${escapeHtml(i.source)}</span>
      </a>
      <span class="separator">•</span>
    </span>`;
  }).join("");
}

/* ticker logic */
function stopTicker(){
  if(tickerAnimationFrame){
    cancelAnimationFrame(tickerAnimationFrame);
    tickerAnimationFrame = null;
  }
}

function setupTicker(){
  const wrap=document.getElementById("tickerWrap");
  const ticker=document.getElementById("ticker");

  stopTicker();

  requestAnimationFrame(()=>{
    tickerHalfWidth=ticker.scrollWidth/2;
    currentTickerScroll=0;
    wrap.scrollLeft=0;
    lastTickerFrameTime=null;
  });

  const loop=(t)=>{
    if(lastTickerFrameTime===null) lastTickerFrameTime=t;
    const delta=t-lastTickerFrameTime;
    lastTickerFrameTime=t;

    if(!isTickerHovered && !isTickerDragging){
      const pxPerMs=tickerHalfWidth/tickerDurationMs;
      currentTickerScroll+=pxPerMs*delta;

      if(currentTickerScroll>=tickerHalfWidth){
        currentTickerScroll-=tickerHalfWidth;
      }

      wrap.scrollLeft=currentTickerScroll;
    }

    tickerAnimationFrame=requestAnimationFrame(loop);
  };

  tickerAnimationFrame=requestAnimationFrame(loop);
}

function attachEvents(){
  const wrap=document.getElementById("tickerWrap");

  wrap.addEventListener("mouseenter",()=>isTickerHovered=true);
  wrap.addEventListener("mouseleave",()=>{
    isTickerHovered=false;
    isTickerDragging=false;
    wrap.classList.remove("dragging");
  });

  wrap.addEventListener("mousedown",(e)=>{
    isTickerDragging=true;
    isTickerHovered=true;
    tickerDragStartX=e.clientX;
    tickerDragStartScrollLeft=currentTickerScroll;
    wrap.classList.add("dragging");
  });

  window.addEventListener("mousemove",(e)=>{
    if(!isTickerDragging)return;

    const dx=e.clientX-tickerDragStartX;
    currentTickerScroll=tickerDragStartScrollLeft-dx;

    if(currentTickerScroll<0) currentTickerScroll+=tickerHalfWidth;
    if(currentTickerScroll>=tickerHalfWidth) currentTickerScroll-=tickerHalfWidth;

    wrap.scrollLeft=currentTickerScroll;
  });

  window.addEventListener("mouseup",()=>{
    isTickerDragging=false;
    const wrap=document.getElementById("tickerWrap");
    wrap.classList.remove("dragging");
  });
}

/* load */
async function load(){
  try{
    const res=await fetch(FEED+"?t="+Date.now(), { cache: "no-store" });
    const xml=await res.text();
    const items=parseRSS(xml);

    const ticker=document.getElementById("ticker");
    ticker.className="ticker-track";
    ticker.innerHTML=buildTicker(items)+buildTicker(items);

    setupTicker();
  }catch(e){
    const ticker=document.getElementById("ticker");
    ticker.className="loading";
    ticker.textContent="Could not load feed.";
    console.error(e);
  }
}

attachEvents();
load();

/* periodic refresh */
setInterval(() => {
  safeRefresh();
}, 5 * 60 * 1000);

/* refresh when tab becomes visible */
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible"){
    safeRefresh();
  }
});

/* refresh when window regains focus */
window.addEventListener("focus", () => {
  safeRefresh();
});
</script>
</body>
</html>
