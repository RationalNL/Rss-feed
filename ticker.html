<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Ticker</title>

<style>

:root{
  color-scheme: light dark;
  --bg:#ffffff;
  --text:#37352f;
  --muted:rgba(55,53,47,0.35);
}

@media (prefers-color-scheme: dark){
:root{
  --bg:#191919;
  --text:rgba(255,255,255,0.9);
  --muted:rgba(255,255,255,0.35);
}
}

html,body{
margin:0;
padding:0;
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
overflow:hidden;
}

.ticker-wrap{
width:100%;
height:28px;
display:flex;
align-items:center;
overflow:hidden;
white-space:nowrap;
}

.ticker-track{
display:flex;
align-items:center;
min-width:max-content;
animation:ticker-scroll 120s linear infinite;
}

.ticker-item{
display:flex;
align-items:center;
flex:0 0 auto;
}

.ticker-link{
font-weight:600;
font-size:13px;
color:var(--text);
text-decoration:none;
padding:0 4px;
}

.separator{
padding:0 14px;
font-size:12px;
color:var(--muted);
}

@keyframes ticker-scroll{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

</style>
</head>

<body>

<div class="ticker-wrap">
<div id="ticker">Loading…</div>
</div>

<script>

const FEED="./notion.xml";

function escapeHtml(str){
return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function parseRSS(xmlText){

const parser=new DOMParser();
const xml=parser.parseFromString(xmlText,"text/xml");

return Array.from(xml.querySelectorAll("item"))
.map(item=>({

title:item.querySelector("title")?.textContent.trim() || "Untitled",
link:item.querySelector("link")?.textContent.trim() || "#",
date:new Date(item.querySelector("pubDate")?.textContent)

}))
.sort((a,b)=>b.date-a.date);

}

function buildTicker(items){

return items.map(i=>`
<span class="ticker-item">
<a class="ticker-link" href="${escapeHtml(i.link)}" target="_blank">
${escapeHtml(i.title)}
</a>
<span class="separator">•</span>
</span>
`).join("");

}

async function loadTicker(){

const container=document.getElementById("ticker");

const response=await fetch(FEED+"?t="+Date.now());
const xml=await response.text();

const items=parseRSS(xml);

container.className="ticker-track";
container.innerHTML=buildTicker(items)+buildTicker(items);

}

loadTicker();

</script>

</body>
</html>
