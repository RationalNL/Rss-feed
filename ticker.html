<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RSS Ticker</title>

<style>
:root{
  color-scheme: light dark;

  --bg:#ffffff;
  --text:#37352f;
  --muted:rgba(55,53,47,0.68);
  --subtle:rgba(55,53,47,0.46);
  --separator:rgba(55,53,47,0.28);
  --border:rgba(55,53,47,0.08);
  --hover:rgba(55,53,47,0.06);

  /* exact Notion-style blue background */
  --ticker-bg:rgba(46,170,220,0.20);
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#191919;
    --text:rgba(255,255,255,0.92);
    --muted:rgba(255,255,255,0.72);
    --subtle:rgba(255,255,255,0.48);
    --separator:rgba(255,255,255,0.26);
    --border:rgba(255,255,255,0.08);
    --hover:rgba(255,255,255,0.08);

    --ticker-bg:rgba(46,170,220,0.28);
  }
}

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
  overflow:hidden;
}

.shell{
  box-sizing:border-box;
  width:100%;
  height:100vh;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  background:var(--bg);
  padding:10px 14px 10px 14px;
  gap:10px;
}

/* ticker */
.ticker-wrap{
  position:relative;
  width:100%;
  height:34px;
  display:flex;
  align-items:center;
  overflow:hidden;
  white-space:nowrap;
  flex:0 0 auto;

  background:var(--ticker-bg);

  /* square edges like native Notion block */
  border-radius:0;

  padding:4px 10px;
  margin-bottom:6px;
}

/* fade only the text edges */
.ticker-wrap::before,
.ticker-wrap::after{
  content:"";
  position:absolute;
  top:0;
  width:28px;
  height:100%;
  z-index:2;
  pointer-events:none;
}

.ticker-wrap::before{
  left:0;
  background:linear-gradient(to right, var(--ticker-bg), transparent);
}

.ticker-wrap::after{
  right:0;
  background:linear-gradient(to left, var(--ticker-bg), transparent);
}

.ticker-track{
  display:flex;
  align-items:center;
  min-width:max-content;
  animation:ticker-scroll 160s linear infinite;
  will-change:transform;
}

.ticker-wrap:hover .ticker-track{
  animation-play-state:paused;
}

.ticker-item{
  display:flex;
  align-items:center;
  flex:0 0 auto;
}

.ticker-link{
  display:inline-flex;
  align-items:center;
  color:var(--text);
  text-decoration:none;
  font-size:12.5px;
  line-height:1.2;
  padding:2px 5px;
  border-radius:6px;
  transition:background-color 120ms ease;
}

.ticker-link:hover{
  background:var(--hover);
}

.prefix{
  color:var(--muted);
  font-weight:400;
}

.headline{
  color:var(--text);
  font-weight:600;
}

.source{
  color:var(--subtle);
  font-weight:400;
}

.separator{
  padding:0 12px;
  font-size:12px;
  color:var(--separator);
  user-select:none;
}

@keyframes ticker-scroll{
  from{ transform:translateX(0); }
  to{ transform:translateX(-50%); }
}
</style>
</head>

<body>

<div class="shell">
  <div class="ticker-wrap">
    <div id="ticker" class="loading">Loading…</div>
  </div>
</div>

</body>
</html>
