<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RSS Ticker</title>

<style>
:root{
  color-scheme: light dark;

  --bg:#ffffff;
  --text:#37352f;
  --muted:rgba(55,53,47,0.68);
  --subtle:rgba(55,53,47,0.46);
  --separator:rgba(55,53,47,0.28);
  --border:rgba(55,53,47,0.08);
  --hover:rgba(55,53,47,0.06);

  --ticker-bg: rgba(46,170,220,0.2);
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#191919;
    --text:rgba(255,255,255,0.92);
    --muted:rgba(255,255,255,0.72);
    --subtle:rgba(255,255,255,0.48);
    --separator:rgba(255,255,255,0.26);
    --border:rgba(255,255,255,0.08);
    --hover:rgba(255,255,255,0.08);

    --ticker-bg:rgba(40,69,108,1.0);
  }
}

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
  overflow:hidden;
}

.shell{
  box-sizing:border-box;
  width:100%;
  height:100vh;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  background:var(--bg);
  padding:10px 14px 10px 14px;
  gap:10px;
}

/* ticker */
.ticker-wrap{
  position:relative;
  width:100%;
  height:32px;
  display:flex;
  align-items:center;
  overflow-x:auto;
  overflow-y:hidden;
  white-space:nowrap;
  flex:0 0 auto;

  background:var(--ticker-bg);
  border-radius:0;

  padding:3px 12px;
  margin-bottom:6px;

  cursor:grab;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

.ticker-wrap::-webkit-scrollbar{
  display:none;
}

.ticker-wrap.dragging{
  cursor:grabbing;
}

.ticker-track{
  display:flex;
  align-items:center;
  min-width:max-content;
  will-change:scroll-position;
}

.ticker-item{
  display:flex;
  align-items:center;
  flex:0 0 auto;
}

.ticker-link{
  display:inline-flex;
  align-items:center;
  color:var(--text);
  text-decoration:none;
  font-size:13px;
  line-height:1.2;
  padding:2px 5px;
  border-radius:6px;
  transition:background-color 120ms ease;
}

.ticker-link:hover{
  background:var(--hover);
}

.prefix{
  color:var(--muted);
  font-weight:400;
}

.headline{
  color:var(--text);
  font-weight:600;
}

.source{
  color:var(--subtle);
  font-weight:400;
}

.separator{
  padding:0 12px;
  font-size:13px;
  color:var(--separator);
  user-select:none;
}

/* teaser strip */
.teaser-strip{
  flex:1 1 auto;
  min-height:0;
  width:100%;
  display:flex;
  align-items:stretch;
  justify-content:flex-start;
  overflow:hidden;
  gap:0;
}

.teaser-card{
  flex:0 0 auto;
  min-width:0;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding-top:2px;
}

.teaser-card.with-divider::before{
  content:"";
  position:absolute;
  left:calc(-1 * var(--divider-offset, 12px));
  top:50%;
  transform:translateY(-50%);
  width:1px;
  height:24px;
  background:var(--border);
}

.teaser-link{
  text-decoration:none;
  color:inherit;
  display:block;
  border-radius:8px;
  padding:4px 6px;
  margin:0 -6px;
  transition:background-color 120ms ease;
  min-width:0;
}

.teaser-link:hover{
  background:var(--hover);
}

.teaser-title{
  margin:0 0 6px 0;
  font-size:14px;
  line-height:1.35;
  font-weight:600;
  color:var(--text);
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.teaser-meta{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  font-size:12px;
  line-height:1.3;
  color:var(--muted);
  min-width:0;
}

.teaser-source{
  color:var(--subtle);
}

.teaser-card .teaser-link{
  width:var(--card-width, auto);
  max-width:var(--card-max-width, 420px);
  box-sizing:border-box;
}

.measure-strip{
  position:absolute;
  left:-99999px;
  top:-99999px;
  visibility:hidden;
  pointer-events:none;
  display:flex;
  gap:0;
  overflow:hidden;
}

.measure-strip .teaser-card{
  flex:0 0 auto;
}

.loading,
.error{
  font-size:13px;
  color:var(--muted);
}

@media (max-width: 900px){
  .shell{
    padding:8px 10px;
    gap:8px;
  }

  .ticker-wrap{
    height:32px;
  }

  .ticker-link{
    font-size:13px;
  }

  .separator{
    padding:0 10px;
  }

  .teaser-title{
    font-size:13px;
  }
}

@media (max-width: 600px){
  .shell{
    padding:8px 8px;
  }

  .teaser-title{
    font-size:13px;
    -webkit-line-clamp:2;
  }

  .teaser-meta{
    font-size:11px;
  }
}
</style>
</head>

<body>
<div class="shell">
  <div class="ticker-wrap" id="tickerWrap">
    <div id="ticker" class="loading">Loading…</div>
  </div>

  <div id="teasers" class="teaser-strip">
    <div class="loading">Loading latest articles…</div>
  </div>
</div>

<div id="measure-strip" class="measure-strip"></div>

<script>
const FEED = "./notion.xml";
let ALL_ITEMS = [];

/* ticker auto-scroll + drag state */
let tickerAnimationFrame = null;
let tickerHalfWidth = 0;
let currentTickerScroll = 0;
let isTickerHovered = false;
let isTickerDragging = false;
let tickerDragStartX = 0;
let tickerDragStartScrollLeft = 0;

const tickerDurationMs = 160000;
let lastTickerFrameTime = null;

/* refresh control */
let lastRefreshTime = 0;
const MIN_REFRESH_INTERVAL = 15000;

function safeRefresh(){
  const now = Date.now();
  if (now - lastRefreshTime < MIN_REFRESH_INTERVAL) return;
  lastRefreshTime = now;
  refreshAll();
}

/* utils */
function escapeHtml(str){
  return (str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function formatDateTime(date){
  if (!(date instanceof Date) || isNaN(date)) return "";
  return date.toLocaleString("en-GB",{
    day:"numeric",
    month:"long",
    hour:"2-digit",
    minute:"2-digit",
    hour12:false
  }).replace(",","");
}

function splitTitleAndSource(fullTitle){
  const parts = (fullTitle || "").split(" - ");
  if (parts.length >= 2){
    const source = parts.pop();
    const title = parts.join(" - ");
    return { title, source };
  }
  return { title: fullTitle || "Untitled", source: "" };
}

function parseRSS(xmlText){
  const xml = new DOMParser().parseFromString(xmlText,"text/xml");
  return [...xml.querySelectorAll("item")].map(item=>{
    const full = item.querySelector("title")?.textContent?.trim() || "Untitled";
    const split = splitTitleAndSource(full);

    return {
      title: split.title,
      source: split.source,
      link: item.querySelector("link")?.textContent?.trim() || "#",
      pubDate: new Date(item.querySelector("pubDate")?.textContent || "")
    };
  }).sort((a,b)=>b.pubDate-a.pubDate);
}

function buildTicker(items){
  return items.map(i=>{
    return `
      <span class="ticker-item">
        <a class="ticker-link" href="${escapeHtml(i.link)}" target="_blank" rel="noopener noreferrer">
          <span class="prefix">${escapeHtml(formatDateTime(i.pubDate))} - </span>
          <span class="headline">${escapeHtml(i.title)}</span>
          <span class="source"> - ${escapeHtml(i.source)}</span>
        </a>
        <span class="separator">•</span>
      </span>`;
  }).join("");
}

function getCardMaxWidth(width){
  if (width <= 700) return 280;
  if (width <= 1100) return 330;
  return 380;
}

function getMinGap(width){
  if (width <= 700) return 18;
  if (width <= 1100) return 24;
  return 30;
}

function createCardHtml(item, withDivider = false){
  return `
    <div class="teaser-card ${withDivider ? "with-divider" : ""}">
      <a class="teaser-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">
        <h3 class="teaser-title">${escapeHtml(item.title)}</h3>
        <div class="teaser-meta">
          <span>${escapeHtml(formatDateTime(item.pubDate))}</span>
          ${item.source ? `<span>·</span><span class="teaser-source">${escapeHtml(item.source)}</span>` : ""}
        </div>
      </a>
    </div>
  `;
}

function measureCards(items, containerWidth){
  const measureStrip = document.getElementById("measure-strip");
  const maxWidth = getCardMaxWidth(containerWidth);

  measureStrip.style.setProperty("--card-max-width", `${maxWidth}px`);
  measureStrip.innerHTML = items.map(item => createCardHtml(item)).join("");

  const cards = Array.from(measureStrip.querySelectorAll(".teaser-card"));
  return cards.map(card => {
    const link = card.querySelector(".teaser-link");
    return Math.ceil(link.getBoundingClientRect().width);
  });
}

function renderTeasers(){
  const container = document.getElementById("teasers");
  if (!ALL_ITEMS.length) return;

  const width = container.clientWidth;
  const minGap = getMinGap(width);

  if (width <= 520){
    container.innerHTML = "";
    container.style.gap = "0px";
    return;
  }

  const candidateItems = ALL_ITEMS.slice(0, 10);
  const measuredWidths = measureCards(candidateItems, width);

  let used = 0;
  let count = 0;

  for (let i = 0; i < measuredWidths.length; i++){
    const nextWidth = measuredWidths[i];
    const nextUsed = used + nextWidth + (count > 0 ? minGap : 0);

    if (nextUsed <= width){
      used = nextUsed;
      count++;
    } else {
      break;
    }
  }

  if (count === 0){
    container.innerHTML = "";
    container.style.gap = "0px";
    return;
  }

  const visibleItems = candidateItems.slice(0, count);
  const visibleWidths = measuredWidths.slice(0, count);

  let gap = minGap;
  if (count > 1){
    const totalCardsWidth = visibleWidths.reduce((a,b) => a + b, 0);
    const leftover = Math.max(0, width - totalCardsWidth);
    gap = leftover / (count - 1);
  }

  container.style.gap = `${gap}px`;
  container.style.setProperty("--divider-offset", `${Math.max(10, gap / 2)}px`);
  container.style.setProperty("--card-max-width", `${getCardMaxWidth(width)}px`);

  container.innerHTML = visibleItems.map((item, index) =>
    createCardHtml(item, index > 0)
  ).join("");
}

/* ticker logic */
function stopTicker(){
  if (tickerAnimationFrame){
    cancelAnimationFrame(tickerAnimationFrame);
    tickerAnimationFrame = null;
  }
}

function setupTicker(){
  const wrap = document.getElementById("tickerWrap");
  const ticker = document.getElementById("ticker");

  stopTicker();

  if (!ticker || ticker.classList.contains("loading") || ticker.classList.contains("error")){
    return;
  }

  requestAnimationFrame(()=>{
    tickerHalfWidth = ticker.scrollWidth / 2;
    currentTickerScroll = 0;
    wrap.scrollLeft = 0;
    lastTickerFrameTime = null;
  });

  const loop = (t) => {
    if (lastTickerFrameTime === null) lastTickerFrameTime = t;
    const delta = t - lastTickerFrameTime;
    lastTickerFrameTime = t;

    if (!isTickerHovered && !isTickerDragging && tickerHalfWidth > 0){
      const pxPerMs = tickerHalfWidth / tickerDurationMs;
      currentTickerScroll += pxPerMs * delta;

      if (currentTickerScroll >= tickerHalfWidth){
        currentTickerScroll -= tickerHalfWidth;
      }

      wrap.scrollLeft = currentTickerScroll;
    }

    tickerAnimationFrame = requestAnimationFrame(loop);
  };

  tickerAnimationFrame = requestAnimationFrame(loop);
}

function attachEvents(){
  const wrap = document.getElementById("tickerWrap");

  wrap.addEventListener("mouseenter", () => {
    isTickerHovered = true;
  });

  wrap.addEventListener("mouseleave", () => {
    isTickerHovered = false;
    isTickerDragging = false;
    wrap.classList.remove("dragging");
  });

  wrap.addEventListener("mousedown", (e) => {
    isTickerDragging = true;
    isTickerHovered = true;
    tickerDragStartX = e.clientX;
    tickerDragStartScrollLeft = currentTickerScroll;
    wrap.classList.add("dragging");
  });

  window.addEventListener("mousemove", (e) => {
    if (!isTickerDragging) return;

    const dx = e.clientX - tickerDragStartX;
    currentTickerScroll = tickerDragStartScrollLeft - dx;

    if (tickerHalfWidth > 0){
      while (currentTickerScroll < 0){
        currentTickerScroll += tickerHalfWidth;
        tickerDragStartScrollLeft += tickerHalfWidth;
      }

      while (currentTickerScroll >= tickerHalfWidth){
        currentTickerScroll -= tickerHalfWidth;
        tickerDragStartScrollLeft -= tickerHalfWidth;
      }
    }

    wrap.scrollLeft = currentTickerScroll;
  });

  window.addEventListener("mouseup", () => {
    isTickerDragging = false;
    const wrap = document.getElementById("tickerWrap");
    wrap.classList.remove("dragging");
  });

  wrap.addEventListener("dragstart", (e) => {
    e.preventDefault();
  });
}

/* load */
async function load(){
  const ticker = document.getElementById("ticker");
  const teasers = document.getElementById("teasers");

  try{
    const res = await fetch(FEED + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const xml = await res.text();
    const items = parseRSS(xml);

    ALL_ITEMS = items;

    if (!items.length){
      ticker.className = "error";
      ticker.textContent = "No items found.";
      teasers.innerHTML = `<div class="error">No article data found.</div>`;
      return;
    }

    ticker.className = "ticker-track";
    ticker.innerHTML = buildTicker(items) + buildTicker(items);

    renderTeasers();
    setupTicker();
  } catch(e){
    ticker.className = "error";
    ticker.textContent = "Could not load feed.";
    teasers.innerHTML = `<div class="error">Could not load latest articles.</div>`;
    console.error(e);
  }
}

const resizeObserver = new ResizeObserver(() => {
  renderTeasers();
  setupTicker();
});

async function refreshAll(){
  await load();
  const teaserContainer = document.getElementById("teasers");
  resizeObserver.observe(teaserContainer);
}

attachEvents();
refreshAll();

setInterval(() => {
  safeRefresh();
}, 5 * 60 * 1000);

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible"){
    safeRefresh();
  }
});

window.addEventListener("focus", () => {
  safeRefresh();
});
</script>
</body>
</html>
